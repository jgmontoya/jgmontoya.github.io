---
layout: default
---

<article class="post">
<small>{{ page.date | date: "%-d %B %Y" }}</small>
<h1>{{ page.title | escape }}</h1>

<p class="view">by {{ page.author | default: site.author }}</p>

{% if page.draft %}
<blockquote><strong>Draft preview.</strong> This article is not yet published and may still change.</blockquote>
{% endif %}

{{content}}


<a href="{{'/' | relative_url}}">Back</a>
</article>
